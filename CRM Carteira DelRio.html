<head>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function daysBefore(n){const d=new Date();d.setDate(d.getDate()-n);return d;}
function diasSemCompra(data){return Math.floor((new Date()-new Date(data))/86400000);}
function fmtMoeda(v){return (v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});}
function fmtData(d){if(!d)return"—";return new Date(d).toLocaleDateString("pt-BR");}
function iniciais(nome){return nome.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();}

const METAS = {faturamento:15000,atendimentos:80,cadastros:10,pa:5,tkm:700};

  {id:"c1",nome:"Rafaela Souza",tel:"(85) 99801-2345",cidade:"Fortaleza",perfil:"revendedora",uc:daysBefore(12),dc:daysBefore(180),tkm:874,total:15820,pa:6.2,status:"ativo"},

  {id:"c10",nome:"Tatiane Moura",tel:"(85) 98234-5670",cidade:"Sobral",perfil:"revendedora",uc:daysBefore(30),dc:daysBefore(600),tkm:560,total:16800,pa:4.9,status:"ativo"},

const PROSPECTOS_INIT = [
  {id:"p1",nome:"Cristina Barros",tel:"(84) 99101-2222",cidade:"Natal",potencial:1326,status:"novo",uc:null,notas:""},

  {id:"p6",nome:"Andréia Pinto",tel:"(84) 98606-7777",cidade:"Mossoró",potencial:1430,status:"convertido",uc:daysBefore(2),notas:"Convertida! Primeira compra R$1.400"},
];

const ATENDIMENTOS_INIT = [
  {id:"a1",cid:"c1",data:daysBefore(12),tipo:"presencial",resultado:"comprou",valor:874,pecas:6,obs:"Comprou coleção seamless nova"},
  {id:"a2",cid:"c4",data:daysBefore(5),tipo:"whatsapp",resultado:"comprou",valor:320,pecas:3,obs:"Pedido via catálogo digital"},

// ── PROGRAMA DE CARREIRA ─────────────────────────────────────────────────────
const NIVEIS=[
  {id:0,nome:"Não Classificada",label:"Não Classif.",faixaMin:0,faixaMax:2999,bonus:0,cor:"#6b7280",bg:"#f3f4f6",emoji:"⬜"},
  {id:1,nome:"Nível 1 — Iniciante",label:"Iniciante",faixaMin:3000,faixaMax:4999,bonus:3,cor:"#16a34a",bg:"#dcfce7",emoji:"🟢"},
  {id:2,nome:"Nível 2 — Divas",label:"Divas",faixaMin:5000,faixaMax:9999,bonus:5,cor:"#2563eb",bg:"#dbeafe",emoji:"🔵"},
  {id:3,nome:"Nível 3 — Musas",label:"Musas",faixaMin:10000,faixaMax:19999,bonus:8,cor:"#7B3FA0",bg:"#f3e8ff",emoji:"🟣"},
  {id:4,nome:"Nível 4 — Tops",label:"Tops",faixaMin:20000,faixaMax:49999,bonus:10,cor:"#d97706",bg:"#fef3c7",emoji:"🟡"},
  {id:5,nome:"Nível 5 — Elite DEL'AS",label:"Elite DEL'AS",faixaMin:50000,faixaMax:99999,bonus:12,cor:"#dc2626",bg:"#fee2e2",emoji:"🔴"},
  {id:6,nome:"TOPS",label:"TOPS",faixaMin:100000,faixaMax:Infinity,bonus:12,cor:"#5C2D7A",bg:"#ede9fe",emoji:"💜"},
];
const LIMITES_NIVEL=[3000,5000,10000,20000,50000,100000];

function getNivel(volAnual){
  if(volAnual>=100000) return NIVEIS[6];
  if(volAnual>=50000)  return NIVEIS[5];
  if(volAnual>=20000)  return NIVEIS[4];
  if(volAnual>=10000)  return NIVEIS[3];
  if(volAnual>=5000)   return NIVEIS[2];
  if(volAnual>=3000)   return NIVEIS[1];
  return NIVEIS[0];
}
function getProximoNivel(volAnual){
  for(let l of LIMITES_NIVEL){ if(volAnual<l) return l; }
  return null;
}
function getVolAnual(c){ return Math.round(c.total*0.72); }

// ── MINI COMPONENTS ──────────────────────────────────────────────────────────
function Avatar({nome,size=38}){
  const cores=["#7B3FA0","#f59e0b","#7c3aed","#0891b2","#be185d","#059669"];
  const cor=cores[nome.charCodeAt(0)%cores.length];
  return(
    <div style={{width:size,height:size,borderRadius:"50%",background:cor,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
      <span style={{color:"#fff",fontWeight:800,fontSize:size*0.36}}>{iniciais(nome)}</span>
    </div>
  );
}

function BadgeStatus({status}){
  const m={ativo:{l:"Ativa",bg:"#dcfce7",c:"#16a34a"},prestes_inativar:{l:"Prestes inativar",bg:"#fef9c3",c:"#ca8a04"},inativo:{l:"Inativa",bg:"#fee2e2",c:"#dc2626"}};
  const s=m[status]||{l:"Prospecto",bg:"#e0f2fe",c:"#0369a1"};
  return <span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.l}</span>;
}

function BadgePerfil({perfil}){
  const m={consumidora_final:{l:"Consumidora",c:"#7c3aed"},renda_extra:{l:"Renda Extra",c:"#0891b2"},revendedora:{l:"Revendedora",c:"#b45309"},empreendedora:{l:"Empreendedora",c:"#be185d"}};
  const p=m[perfil]||{l:perfil,c:"#666"};
  return <span style={{fontSize:10,fontWeight:600,color:p.c,background:p.c+"22",padding:"2px 9px",borderRadius:20}}>{p.l}</span>;
}

function BadgeNivel({volAnual}){
  const n=getNivel(volAnual);
  return <span style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,background:n.bg,color:n.cor,whiteSpace:"nowrap",border:`1px solid ${n.cor}22`}}>{n.emoji} {n.label}</span>;
}

function Gauge({valor,meta,label,fmt="num",cor}){
  const pct=Math.min((valor/meta)*100,100);
  const R=40,C=2*Math.PI*R,off=C-(pct/100)*C;
  const gc=pct>=85?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
  const cl=cor||gc;
  const disp=fmt==="moeda"?fmtMoeda(valor):fmt==="pct"?`${pct.toFixed(0)}%`:fmt==="dec"?(valor||0).toFixed(1):(valor||0).toLocaleString("pt-BR");
  const fs=fmt==="moeda"?9:15;
  return(
    <div style={{background:"#fff",borderRadius:14,padding:"14px 8px 12px",boxShadow:"0 2px 10px #0001",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <p style={{fontSize:10,fontWeight:700,color:"#7B3FA0",textTransform:"uppercase",letterSpacing:.8,margin:0,textAlign:"center"}}>{label}</p>
      <div style={{position:"relative",width:90,height:90}}>
        <svg width={90} height={90} style={{transform:"rotate(-90deg)"}}>
          <circle cx={45} cy={45} r={R} fill="none" stroke="#f0f0f0" strokeWidth={8}/>
          <circle cx={45} cy={45} r={R} fill="none" stroke={cl} strokeWidth={8} strokeDasharray={C} strokeDashoffset={off} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.2s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:fs,fontWeight:800,color:"#1a1a2e",lineHeight:1,textAlign:"center"}}>{disp}</span>
        </div>
      </div>
      <p style={{fontSize:9,color:"#bbb",margin:0}}>Meta: {fmt==="moeda"?fmtMoeda(meta):meta}</p>
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({atendimentos}){
  const fat=atendimentos.filter(a=>a.resultado==="comprou").reduce((s,a)=>s+a.valor,0);
  const nAt=atendimentos.length;
  const nPec=atendimentos.reduce((s,a)=>s+a.pecas,0);
  const pa=nAt?nPec/nAt:0;
  const tkmAt=nAt?fat/nAt:0;
  const ativos=CLIENTES.filter(c=>c.status==="ativo").length;
  const novos=CLIENTES.filter(c=>diasSemCompra(c.dc)<30).length;
  const tkmCli=ativos?fat/ativos:0;
  const inativos=CLIENTES.filter(c=>c.status==="inativo").length;
  const prestes=CLIENTES.filter(c=>c.status==="prestes_inativar").length;
  const emCarteira=CLIENTES.length;
  const posit=Math.round((ativos/emCarteira)*100);
  const metaPct=Math.round((fat/METAS.faturamento)*100);

  return(
    <div style={{paddingBottom:24}}>
      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,#7B3FA0 0%,#5C2D7A 100%)",padding:"20px 16px 28px",borderRadius:"0 0 28px 28px"}}>
        <p style={{color:"#e8d5f5",fontSize:11,margin:"0 0 2px"}}>Olá,</p>
        <h2 style={{color:"#fff",margin:"0 0 2px",fontSize:20,fontWeight:800}}>{VENDEDOR.nome} 👋</h2>
        <p style={{color:"#e8d5f5",fontSize:11,margin:"0 0 12px"}}>Março 2026 · Meta {metaPct}% atingida</p>
        <div style={{background:"#ffffff25",borderRadius:8,height:10,overflow:"hidden",marginBottom:4}}>
          <div style={{width:`${Math.min(metaPct,100)}%`,background:"#fff",height:"100%",borderRadius:8,transition:"width 1.2s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#fff",fontSize:12,fontWeight:700}}>{fmtMoeda(fat)}</span>
          <span style={{color:"#e8d5f5",fontSize:11}}>Meta: {fmtMoeda(METAS.faturamento)}</span>
        </div>

        {/* Mini stats hero */}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[{l:"Atendimentos",v:nAt},{l:"P.A",v:pa.toFixed(1)},{l:"Cl. Ativos",v:ativos}].map(s=>(
            <div key={s.l} style={{flex:1,background:"#ffffff20",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
              <p style={{margin:0,color:"#fff",fontSize:16,fontWeight:800}}>{s.v}</p>
              <p style={{margin:0,color:"#e8d5f5",fontSize:9,textTransform:"uppercase",letterSpacing:.5}}>{s.l}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Alerta */}
      {(prestes>0||inativos>0)&&(
        <div style={{margin:"16px 14px 0",background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:12,padding:"10px 14px",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:22}}>⚠️</span>
          <div>
            <p style={{margin:0,fontSize:12,fontWeight:700,color:"#9a3412"}}>Atenção necessária</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:"#c2410c"}}>{prestes} prestes a inativar · {inativos} já inativas</p>
          </div>
        </div>
      )}

      {/* Gauges Vendas */}
      <div style={{padding:"18px 14px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#7B3FA0"}}/>
          <span style={{fontSize:13,fontWeight:800,color:"#1a1a2e"}}>Vendas — Mês Atual</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Gauge valor={fat} meta={METAS.faturamento} label="Faturamento" fmt="moeda"/>
          <Gauge valor={nAt} meta={METAS.atendimentos} label="Qt. Atendimentos"/>
          <Gauge valor={tkmAt} meta={METAS.tkm} label="Tkm Atendimento" fmt="moeda"/>
          <Gauge valor={tkmCli} meta={METAS.tkm*1.2} label="Tkm Cliente" fmt="moeda"/>
          <Gauge valor={pa} meta={METAS.pa} label="P.A (Peças/At.)" fmt="dec"/>
          <Gauge valor={novos} meta={METAS.cadastros} label="Cli. Cadastrados"/>
          <Gauge valor={ativos} meta={emCarteira} label="Cli. Ativos"/>
          <Gauge valor={posit} meta={100} label="Positivação %" fmt="pct" cor="#7c3aed"/>
        </div>
      </div>

      {/* Cards Clientes */}
      <div style={{padding:"20px 14px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#7B3FA0"}}/>
          <span style={{fontSize:13,fontWeight:800,color:"#1a1a2e"}}>Clientes</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[
            {l:"Cli. em Carteira",v:emCarteira,ic:"👥",c:"#7B3FA0"},
            {l:"Aniversariantes",v:3,ic:"🎂",c:"#f59e0b"},
            {l:"Inativos",v:inativos,ic:"🔴",c:"#ef4444"},
            {l:"Prestes Inativar",v:prestes,ic:"🟡",c:"#f59e0b"},
          ].map(item=>(
            <div key={item.l} style={{background:"#fff",borderRadius:14,padding:"14px 12px",boxShadow:"0 1px 8px #0001",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:26}}>{item.ic}</span>
              <div>
                <p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:.5}}>{item.l}</p>
                <p style={{margin:0,fontSize:22,fontWeight:800,color:item.c}}>{item.v.toLocaleString("pt-BR")}</p>
              </div>
            </div>
          ))}
        </div>
        {/* Positivação bar */}
        <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginTop:8,boxShadow:"0 1px 8px #0001",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:26}}>🕐</span>
            <div>
              <p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:.5}}>Positiv. 0 a 180 dias</p>
              <p style={{margin:0,fontSize:22,fontWeight:800,color:"#0891b2"}}>{posit}%</p>
            </div>
          </div>
          <div style={{position:"relative",width:56,height:56}}>
            <svg width={56} height={56} style={{transform:"rotate(-90deg)"}}>
              <circle cx={28} cy={28} r={22} fill="none" stroke="#e0f2fe" strokeWidth={6}/>
              <circle cx={28} cy={28} r={22} fill="none" stroke="#0891b2" strokeWidth={6}
                strokeDasharray={2*Math.PI*22} strokeDashoffset={2*Math.PI*22*(1-posit/100)} strokeLinecap="round"/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:9,fontWeight:800,color:"#0891b2"}}>{posit}%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── CLIENTES ─────────────────────────────────────────────────────────────────
function Clientes({atendimentos,onRegistrar}){
  const [filtro,setFiltro]=useState("todos");
  const [ordem,setOrdem]=useState("dormencia");
  const [busca,setBusca]=useState("");
  const [detalhe,setDetalhe]=useState(null);

  if(detalhe) return <DetalheCliente c={detalhe} atendimentos={atendimentos} onBack={()=>setDetalhe(null)} onRegistrar={onRegistrar}/>;

  let lista=[...CLIENTES];
  if(filtro!=="todos") lista=lista.filter(c=>c.status===filtro);
  if(busca) lista=lista.filter(c=>c.nome.toLowerCase().includes(busca.toLowerCase())||c.cidade.toLowerCase().includes(busca.toLowerCase()));
  if(ordem==="dormencia") lista.sort((a,b)=>diasSemCompra(b.uc)-diasSemCompra(a.uc));
  if(ordem==="volume") lista.sort((a,b)=>b.total-a.total);
  if(ordem==="tkm") lista.sort((a,b)=>b.tkm-a.tkm);

  const borderCor={ativo:"#22c55e",prestes_inativar:"#f59e0b",inativo:"#ef4444"};

  return(
    <div>
      <div style={{background:"#fff",padding:"12px 14px 10px",borderBottom:"1px solid #f0f0f0",position:"sticky",top:0,zIndex:10}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍  Buscar cliente ou cidade..."
          style={{width:"100%",border:"1px solid #eee",borderRadius:10,padding:"8px 12px",fontSize:12,outline:"none",background:"#f9f9f9",marginBottom:8}}/>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,marginBottom:6}}>
          {[["todos","Todos"],["ativo","Ativas"],["prestes_inativar","Alerta"],["inativo","Inativas"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFiltro(v)} style={{flexShrink:0,padding:"5px 13px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:filtro===v?"#7B3FA0":"#f5f5f5",color:filtro===v?"#fff":"#666",transition:"all .2s"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#aaa"}}>Ordenar:</span>
          {[["dormencia","Dormência"],["volume","Volume"],["tkm","Ticket"]].map(([v,l])=>(
            <button key={v} onClick={()=>setOrdem(v)} style={{flexShrink:0,padding:"3px 10px",borderRadius:20,border:`1px solid ${ordem===v?"#7B3FA0":"#eee"}`,cursor:"pointer",fontSize:10,background:ordem===v?"#f5eeff":"#fff",color:ordem===v?"#7B3FA0":"#888",transition:"all .2s"}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{padding:"8px 12px"}}>
        {lista.length===0&&<p style={{textAlign:"center",padding:40,color:"#ccc",fontSize:13}}>Nenhum cliente encontrado</p>}
        {lista.map(c=>{
          const dias=diasSemCompra(c.uc);
          return(
            <div key={c.id} onClick={()=>setDetalhe(c)} style={{background:"#fff",borderRadius:14,padding:13,marginBottom:8,boxShadow:"0 1px 8px #0001",cursor:"pointer",borderLeft:`4px solid ${borderCor[c.status]||"#ccc"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Avatar nome={c.nome}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#1a1a2e"}}>{c.nome}</span>
                    <BadgePerfil perfil={c.perfil}/>
                  </div>
                  <p style={{margin:"2px 0 0",fontSize:11,color:"#888"}}>{c.cidade} · {dias}d sem comprar</p>
                </div>
                <BadgeStatus status={c.status}/>
              </div>

// ── MODAL ATENDIMENTO ─────────────────────────────────────────────────────────
function ModalAtend({cliente,onClose,onSalvar}){
  const [form,setForm]=useState({tipo:"presencial",resultado:"comprou",valor:"",pecas:"",obs:""});
  const [salvo,setSalvo]=useState(false);

  function salvar(){
    const novo={id:"a"+Date.now(),cid:cliente.id,data:new Date(),tipo:form.tipo,resultado:form.resultado,valor:parseFloat(form.valor)||0,pecas:parseInt(form.pecas)||0,obs:form.obs};
    onSalvar(novo);
    setSalvo(true);
    setTimeout(()=>onClose(),1400);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"#0008",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto",padding:"20px 16px 32px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#1a1a2e"}}>Registrar Atendimento</h3>
          <button onClick={onClose} style={{background:"#f5f5f5",border:"none",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>
        </div>
        <p style={{margin:"0 0 14px",fontSize:12,color:"#888"}}>👤 {cliente.nome}</p>

        {[{label:"Tipo de Contato",key:"tipo",opts:[["presencial","🏪 Presencial"],["whatsapp","💬 WhatsApp"],["ligacao","📞 Ligação"],["instagram","📸 Instagram"]]},
          {label:"Resultado",key:"resultado",opts:[["comprou","✅ Comprou"],["nao_comprou","❌ Não comprou"],["agendou","📅 Agendou"],["sem_contato","📵 Sem contato"]]}
        ].map(f=>(
          <div key={f.key} style={{marginBottom:14}}>
            <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5}}>{f.label}</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {f.opts.map(([v,l])=>(
                <button key={v} onClick={()=>setForm(p=>({...p,[f.key]:v}))} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${form[f.key]===v?"#7B3FA0":"#eee"}`,cursor:"pointer",fontSize:11,background:form[f.key]===v?"#f5eeff":"#fff",color:form[f.key]===v?"#7B3FA0":"#666"}}>{l}</button>
              ))}
            </div>
          </div>
        ))}

        {form.resultado==="comprou"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[{l:"Valor (R$)",k:"valor",ph:"0,00",t:"number"},{l:"Peças",k:"pecas",ph:"0",t:"number"}].map(f=>(
              <div key={f.k}>
                <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{f.l}</p>
                <input type={f.t} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}
                  style={{width:"100%",border:"1px solid #eee",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none"}}/>
              </div>
            ))}
          </div>
        )}

        <div style={{marginBottom:18}}>
          <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Observações</p>
          <textarea value={form.obs} onChange={e=>setForm(p=>({...p,obs:e.target.value}))} placeholder="Notas sobre o atendimento..." rows={3}
            style={{width:"100%",border:"1px solid #eee",borderRadius:8,padding:"8px 10px",fontSize:12,resize:"none",outline:"none"}}/>
        </div>

        <button onClick={salvar} style={{width:"100%",padding:13,background:salvo?"#22c55e":"#7B3FA0",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",transition:"background .3s"}}>
          {salvo?"✅ Registrado com sucesso!":"Registrar Atendimento"}
        </button>
      </div>
    </div>
  );
}

// ── PROSPECÇÃO ────────────────────────────────────────────────────────────────
function Prospeccao(){
  const [lista,setLista]=useState(PROSPECTOS_INIT);
  const [filtro,setFiltro]=useState("todos");
  const [aberto,setAberto]=useState(null);

  const sCor={novo:"#0891b2",contatado:"#f59e0b",em_negociacao:"#7c3aed",convertido:"#22c55e",descartado:"#ef4444"};
  const sLabel={novo:"Novo",contatado:"Contatado",em_negociacao:"Em negociação",convertido:"✅ Convertido",descartado:"Descartado"};

  const filtrada=filtro==="todos"?lista:lista.filter(p=>p.status===filtro);
  const conv=lista.filter(p=>p.status==="convertido").length;
  const taxa=Math.round((conv/lista.length)*100);

  function converter(id){
    setLista(l=>l.map(p=>p.id===id?{...p,status:"convertido",uc:new Date()}:p));
    setAberto(null);
  }

  return(
    <div>
      <div style={{background:"linear-gradient(135deg,#5C2D7A,#3d1a5e)",padding:"16px 16px 20px",borderRadius:"0 0 24px 24px"}}>
        <h2 style={{color:"#fff",margin:"0 0 2px",fontSize:18,fontWeight:800}}>🔍 Base de Prospecção</h2>
        <p style={{color:"#c4b5fd",margin:"0 0 12px",fontSize:11}}>{lista.length} prospectos · {taxa}% taxa de conversão</p>
        <div style={{display:"flex",gap:8}}>
          {[["Parnamirim","2.023"],["Natal","5.653"],["Mossoró","2.295"]].map(([c,n])=>(
            <div key={c} style={{flex:1,background:"#ffffff20",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
              <p style={{margin:0,color:"#fff",fontSize:15,fontWeight:800}}>{n}</p>
              <p style={{margin:0,color:"#c4b5fd",fontSize:9,textTransform:"uppercase"}}>{c}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"12px 14px 0",display:"flex",gap:6,overflowX:"auto"}}>
        {[["todos","Todos"],["novo","Novos"],["contatado","Contatados"],["em_negociacao","Negociação"],["convertido","Convertidos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltro(v)} style={{flexShrink:0,padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:filtro===v?"#7c3aed":"#f5f5f5",color:filtro===v?"#fff":"#666"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"8px 12px"}}>
        {filtrada.map(p=>(
          <div key={p.id} style={{background:"#fff",borderRadius:14,padding:13,marginBottom:8,boxShadow:"0 1px 8px #0001",cursor:"pointer",borderLeft:`4px solid ${sCor[p.status]||"#ccc"}`}}
            onClick={()=>setAberto(aberto===p.id?null:p.id)}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Avatar nome={p.nome} size={36}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#1a1a2e"}}>{p.nome}</span>
                  <span style={{fontSize:10,fontWeight:700,color:sCor[p.status],background:sCor[p.status]+"18",padding:"2px 9px",borderRadius:20}}>{sLabel[p.status]}</span>
                </div>
                <p style={{margin:"2px 0 0",fontSize:11,color:"#888"}}>📍 {p.cidade} · Potencial: {fmtMoeda(p.potencial)}/mês</p>
              </div>
            </div>
            {aberto===p.id&&(
              <div style={{marginTop:12,borderTop:"1px solid #f5f5f5",paddingTop:10}}>
                {p.notas&&<p style={{margin:"0 0 8px",fontSize:12,color:"#555"}}>📝 {p.notas}</p>}
                {p.uc&&<p style={{margin:"0 0 8px",fontSize:11,color:"#aaa"}}>Último contato: {fmtData(p.uc)}</p>}
                <div style={{display:"flex",gap:8}}>
                  <a href={`https://wa.me/55${p.tel.replace(/\D/g,"")}`} target="_blank" style={{flex:1,display:"block"}}>
                    <button style={{width:"100%",padding:8,background:"#dcfce7",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,color:"#16a34a"}}>💬 WhatsApp</button>
                  </a>
                  {p.status!=="convertido"&&(
                    <button onClick={e=>{e.stopPropagation();converter(p.id);}} style={{flex:1,padding:8,background:"#7B3FA0",border:"none",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,color:"#fff"}}>✅ Converter</button>
                  )}
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── METAS ─────────────────────────────────────────────────────────────────────
function Metas({atendimentos}){
  const fat=atendimentos.filter(a=>a.resultado==="comprou").reduce((s,a)=>s+a.valor,0);
  const nAt=atendimentos.length;
  const nPec=atendimentos.reduce((s,a)=>s+a.pecas,0);
  const pa=nAt?nPec/nAt:0;
  const tkm=nAt?fat/nAt:0;
  const novos=3;
  const diaAtual=new Date().getDate();
  const diasMes=31;

  const inds=[
    {l:"💰 Faturamento",atual:fat,meta:METAS.faturamento,fmt:"moeda"},
    {l:"📋 Atendimentos",atual:nAt,meta:METAS.atendimentos,fmt:"num"},
    {l:"🎯 Ticket Médio",atual:tkm,meta:METAS.tkm,fmt:"moeda"},
    {l:"📦 P.A (Peças/At.)",atual:pa,meta:METAS.pa,fmt:"dec"},
    {l:"👤 Novos Cadastros",atual:novos,meta:METAS.cadastros,fmt:"num"},
  ];

  const ranking=[
    {nome:"Fernanda Costa",v:18420,own:false},
    {nome:"Ana Carolina",v:fat,own:true},
    {nome:"Luana Rodrigues",v:11200,own:false},
    {nome:"Tatiane Moura",v:8600,own:false},
  ].sort((a,b)=>b.v-a.v);

  return(
    <div style={{paddingBottom:24}}>
      <div style={{background:"linear-gradient(135deg,#0891b2,#0e7490)",padding:"16px 16px 20px",borderRadius:"0 0 24px 24px"}}>
        <h2 style={{color:"#fff",margin:"0 0 2px",fontSize:18,fontWeight:800}}>📊 Acompanhamento de Metas</h2>
        <p style={{color:"#a5f3fc",margin:0,fontSize:11}}>Março 2026 · Dia {diaAtual} de {diasMes}</p>
      </div>

      <div style={{padding:"16px 14px 0"}}>
        {inds.map(ind=>{
          const pct=Math.min((ind.atual/ind.meta)*100,100);
          const proj=((ind.atual/diaAtual)*diasMes/ind.meta*100);
          const cb=pct>=85?"#22c55e":pct>=60?"#f59e0b":"#ef4444";
          const disp=ind.fmt==="moeda"?fmtMoeda(ind.atual):ind.fmt==="dec"?ind.atual.toFixed(1):Math.round(ind.atual);
          const mDisp=ind.fmt==="moeda"?fmtMoeda(ind.meta):ind.meta;
          return(
            <div key={ind.l} style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,boxShadow:"0 1px 8px #0001"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <p style={{margin:0,fontSize:11,color:"#888"}}>{ind.l}</p>
                  <p style={{margin:"2px 0 0",fontSize:20,fontWeight:800,color:"#1a1a2e"}}>{disp}</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:11,fontWeight:700,color:cb,background:cb+"18",padding:"3px 10px",borderRadius:20}}>{pct.toFixed(0)}%</span>
                  <p style={{margin:"4px 0 0",fontSize:10,color:"#aaa"}}>Meta: {mDisp}</p>
                </div>
              </div>
              <div style={{background:"#f0f0f0",borderRadius:6,height:8,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,background:cb,height:"100%",borderRadius:6,transition:"width 1.2s ease"}}/>
              </div>
              <p style={{margin:"5px 0 0",fontSize:10,color:"#888"}}>
                Projeção: <strong style={{color:proj>=100?"#22c55e":proj>=80?"#f59e0b":"#ef4444"}}>{proj.toFixed(0)}%</strong>
                {proj<80&&" ⚠️ Acelere!"}
                {proj>=100&&" 🚀 No caminho certo!"}
              </p>
            </div>
          );
        })}

        {/* Ranking */}
        <div style={{background:"#fff",borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 8px #0001"}}>
          <p style={{margin:"0 0 12px",fontSize:13,fontWeight:800,color:"#1a1a2e"}}>🏆 Ranking da Equipe</p>
          {ranking.map((v,i)=>(
            <div key={v.nome} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <span style={{fontSize:16,width:22,textAlign:"center",flexShrink:0}}>{["🥇","🥈","🥉","4️⃣"][i]}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,fontWeight:v.own?700:500,color:v.own?"#7B3FA0":"#444"}}>{v.nome}{v.own?" (você)":""}</span>
                  <span style={{fontSize:11,color:"#888"}}>{fmtMoeda(v.v)}</span>
                </div>
                <div style={{background:"#f0f0f0",borderRadius:4,height:5}}>
                  <div style={{width:`${Math.min((v.v/METAS.faturamento)*100,100)}%`,background:i===0?"#f59e0b":v.own?"#7B3FA0":"#94a3b8",height:"100%",borderRadius:4}}/>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── CARREIRA ─────────────────────────────────────────────────────────────────
function Carreira(){
  const [nivelSel,setNivelSel]=useState(null);
  const [clienteSel,setClienteSel]=useState(null);

  // Calcular métricas por nível
  const dadosNiveis=NIVEIS.map(nv=>{
    const clientes=CLIENTES.filter(c=>getNivel(getVolAnual(c)).id===nv.id);
    const ativos=clientes.filter(c=>c.status==="ativo");
    const volTotal=clientes.reduce((s,c)=>s+getVolAnual(c),0);
    const tkmMedio=clientes.length?Math.round(clientes.reduce((s,c)=>s+c.tkm,0)/clientes.length):0;
    // Conversão do mês = clientes que compraram no último mês (uc < 30 dias)
    const compraramMes=clientes.filter(c=>diasSemCompra(c.uc)<=30).length;
    const conversao=clientes.length?Math.round((compraramMes/clientes.length)*100):0;
    return {...nv,clientes,qtd:clientes.length,ativos:ativos.length,volTotal,tkmMedio,conversao,compraramMes};
  }).filter(nv=>nv.qtd>0||nv.id===0);

  const totalClientes=CLIENTES.length;

  return(
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#7B3FA0,#5C2D7A)",padding:"18px 16px 22px",borderRadius:"0 0 24px 24px"}}>
        <h2 style={{color:"#fff",margin:"0 0 2px",fontSize:18,fontWeight:800}}>🏆 Programa de Carreira</h2>
        <p style={{color:"#e8d5f5",margin:0,fontSize:11}}>Gestão dos níveis DelRio · {totalClientes} clientes na carteira</p>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          {[
            {l:"Total Clientes",v:totalClientes,ic:"👥"},
            {l:"Maior Nível",v:CLIENTES.reduce((mx,c)=>{const n=getNivel(getVolAnual(c));return n.id>mx?n.id:mx;},0)===6?"TOPS":NIVEIS[CLIENTES.reduce((mx,c)=>{const n=getNivel(getVolAnual(c));return n.id>mx?n.id:mx;},0)].label,ic:"🌟"},
            {l:"Vol. Total Anual",v:fmtMoeda(CLIENTES.reduce((s,c)=>s+getVolAnual(c),0)),ic:"💰"},
          ].map(s=>(
            <div key={s.l} style={{flex:1,background:"#ffffff20",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
              <p style={{margin:0,color:"#fff",fontSize:s.l==="Vol. Total Anual"?11:14,fontWeight:800}}>{s.v}</p>
              <p style={{margin:0,color:"#e8d5f5",fontSize:9,textTransform:"uppercase",letterSpacing:.4}}>{s.l}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Tabela de Níveis */}
      <div style={{padding:"14px 12px 0"}}>
        <p style={{margin:"0 0 10px",fontSize:13,fontWeight:800,color:"#1a1a2e"}}>Distribuição por Nível</p>

        {/* Header da tabela */}
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,marginBottom:6,padding:"0 4px"}}>
          {["Nível","Clientes","Conv. Mês","Tkm Médio"].map(h=>(
            <p key={h} style={{margin:0,fontSize:9,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:.4,textAlign:h==="Nível"?"left":"center"}}>{h}</p>
          ))}
        </div>

        {dadosNiveis.map(nv=>(
          <div key={nv.id}>
            <div onClick={()=>setNivelSel(nivelSel===nv.id?null:nv.id)}
              style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:6,boxShadow:"0 1px 8px #0001",cursor:"pointer",borderLeft:`4px solid ${nv.cor}`}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:4,alignItems:"center"}}>
                {/* Nível */}
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14}}>{nv.emoji}</span>
                    <div>
                      <p style={{margin:0,fontSize:11,fontWeight:700,color:nv.cor}}>{nv.label}</p>
                      <p style={{margin:0,fontSize:9,color:"#aaa"}}>{nv.bonus}% bônus · {fmtMoeda(nv.volTotal)}</p>
                    </div>
                  </div>
                </div>
                {/* Qtd clientes */}
                <div style={{textAlign:"center"}}>
                  <p style={{margin:0,fontSize:16,fontWeight:800,color:"#1a1a2e"}}>{nv.qtd}</p>
                  <p style={{margin:0,fontSize:9,color:"#aaa"}}>{nv.ativos} ativas</p>
                </div>
                {/* Conversão */}
                <div style={{textAlign:"center"}}>
                  <p style={{margin:0,fontSize:14,fontWeight:800,color:nv.conversao>=60?"#16a34a":nv.conversao>=30?"#d97706":"#dc2626"}}>{nv.conversao}%</p>
                  <p style={{margin:0,fontSize:9,color:"#aaa"}}>{nv.compraramMes}/{nv.qtd}</p>
                </div>
                {/* Tkm */}
                <div style={{textAlign:"center"}}>
                  <p style={{margin:0,fontSize:11,fontWeight:700,color:"#7B3FA0"}}>{fmtMoeda(nv.tkmMedio)}</p>
                  <p style={{margin:0,fontSize:9,color:"#aaa"}}>ticket</p>
                </div>
              </div>

              {/* Barra de progresso proporcional de clientes */}
              <div style={{marginTop:8}}>
                <div style={{background:"#f0f0f0",borderRadius:4,height:4,overflow:"hidden"}}>
                  <div style={{width:`${totalClientes>0?(nv.qtd/totalClientes)*100:0}%`,background:nv.cor,height:"100%",borderRadius:4}}/>
                </div>
              </div>

              {/* Indicador expand */}
              <p style={{margin:"6px 0 0",fontSize:10,color:"#aaa",textAlign:"right"}}>{nivelSel===nv.id?"▲ ocultar clientes":"▼ ver clientes"}</p>
            </div>

            {/* Clientes expandidos */}
            {nivelSel===nv.id&&(
              <div style={{background:"#f9f5ff",borderRadius:10,padding:"8px 10px",marginBottom:8,marginTop:-4}}>
                {nv.clientes.length===0&&<p style={{margin:0,fontSize:12,color:"#aaa",textAlign:"center",padding:8}}>Nenhum cliente neste nível.</p>}
                {nv.clientes.map(c=>{
                  const vol=getVolAnual(c);
                  const prox=getProximoNivel(vol);
                  const falta=prox?prox-vol:0;
                  const pct=prox?Math.min((vol/prox)*100,100):100;
                  const proxNv=prox?getNivel(prox):null;
                  return(
                    <div key={c.id} onClick={()=>setClienteSel(clienteSel===c.id?null:c.id)}
                      style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,cursor:"pointer",boxShadow:"0 1px 4px #0001"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar nome={c.nome} size={32}/>
                        <div style={{flex:1}}>
                          <p style={{margin:0,fontSize:12,fontWeight:700,color:"#1a1a2e"}}>{c.nome}</p>
                          <p style={{margin:0,fontSize:10,color:"#888"}}>{c.cidade} · {fmtMoeda(vol)} vol. anual</p>
                        </div>
                        <BadgeStatus status={c.status}/>
                      </div>
                      {/* Progresso para próximo nível */}
                      {clienteSel===c.id&&(
                        <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f0eef8"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <span style={{fontSize:10,color:"#888"}}>Volume anual: <strong style={{color:nv.cor}}>{fmtMoeda(vol)}</strong></span>
                            <span style={{fontSize:10,color:"#888"}}>{Math.round(pct)}%</span>
                          </div>
                          <div style={{background:"#f0f0f0",borderRadius:4,height:6,overflow:"hidden",marginBottom:6}}>
                            <div style={{width:`${pct}%`,background:nv.cor,height:"100%",borderRadius:4,transition:"width 1s"}}/>
                          </div>
                          {prox?(
                            <p style={{margin:0,fontSize:11,color:"#555"}}>
                              Falta <strong style={{color:nv.cor}}>{fmtMoeda(falta)}</strong> para {proxNv?proxNv.emoji:""} <strong>{proxNv?proxNv.label:""}</strong> ({proxNv?proxNv.bonus:0}% bônus)
                            </p>
                          ):(
                            <p style={{margin:0,fontSize:11,fontWeight:700,color:nv.cor}}>💜 Nível máximo — TOPS!</p>
                          )}
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:10}}>
                            {[{l:"Ticket Médio",v:fmtMoeda(c.tkm)},{l:"Bônus Atual",v:`${nv.bonus}%`},{l:"P.A",v:c.pa}].map(s=>(
                              <div key={s.l} style={{background:"#f9f5ff",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
                                <p style={{margin:0,fontSize:9,color:"#aaa",textTransform:"uppercase"}}>{s.l}</p>
                                <p style={{margin:0,fontSize:12,fontWeight:700,color:"#7B3FA0"}}>{s.v}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}

        {/* Tabela resumo de faixas */}
        <p style={{margin:"14px 0 8px",fontSize:13,fontWeight:800,color:"#1a1a2e"}}>Tabela de Faixas e Bônus</p>
        <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 8px #0001",marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr",background:"#7B3FA0",padding:"8px 12px"}}>
            {["Nível","Faixa Anual","Bônus"].map(h=>(
              <p key={h} style={{margin:0,fontSize:10,fontWeight:700,color:"#fff",textTransform:"uppercase",textAlign:h==="Bônus"?"center":"left"}}>{h}</p>
            ))}
          </div>
          {NIVEIS.map((nv,i)=>(
            <div key={nv.id} style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr",padding:"9px 12px",background:i%2===0?"#fff":"#faf8ff",borderBottom:i<NIVEIS.length-1?"1px solid #f0eef8":"none",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:12}}>{nv.emoji}</span>
                <span style={{fontSize:11,fontWeight:600,color:nv.cor}}>{nv.label}</span>
              </div>
              <span style={{fontSize:11,color:"#555"}}>
                {nv.id===0?"Até R$ 2.999":nv.id===6?"A partir de R$ 100.000":`R$ ${(nv.faixaMin/1000).toFixed(0)}k – R$ ${(nv.faixaMax/1000).toFixed(0)}k`}
              </span>
              <span style={{fontSize:12,fontWeight:700,color:nv.cor,textAlign:"center"}}>{nv.bonus}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [aba,setAba]=useState("dashboard");
  const [atendimentos,setAtendimentos]=useState(ATENDIMENTOS_INIT);
  const [notifOpen,setNotifOpen]=useState(false);
  const [modalRapido,setModalRapido]=useState(false);
  const [clienteRapido,setClienteRapido]=useState(null);

  const alertas=CLIENTES.filter(c=>c.status==="prestes_inativar"||c.status==="inativo");
  const abas=[{id:"dashboard",ic:"🏠",l:"Geral"},{id:"clientes",ic:"👥",l:"Clientes"},{id:"prospeccao",ic:"🔍",l:"Prospecção"},{id:"metas",ic:"📊",l:"Metas"},{id:"carreira",ic:"🏆",l:"Carreira"}];

  function onRegistrar(d){setAtendimentos(a=>[...a,d]);}

  return(
    <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:"#f5f5f7",display:"flex",flexDirection:"column",position:"relative",boxShadow:"0 0 60px #0003"}}>

      {/* TopBar */}
      <div style={{background:"#fff",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 1px 0 #eee",position:"sticky",top:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:"#7B3FA0",borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#fff",fontWeight:900,fontSize:11,letterSpacing:-.5}}>DR</span>
          </div>
          <span style={{fontWeight:800,fontSize:14,color:"#1a1a2e"}}>DelRio CRM</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setModalRapido(true)} style={{background:"#7B3FA0",border:"none",color:"#fff",padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Atendimento</button>
          <button onClick={()=>setNotifOpen(!notifOpen)} style={{background:"#f5f5f7",border:"none",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16,position:"relative"}}>
            🔔
            {alertas.length>0&&<span style={{position:"absolute",top:1,right:1,background:"#7B3FA0",color:"#fff",fontSize:8,fontWeight:700,width:14,height:14,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>{alertas.length}</span>}
          </button>
        </div>
      </div>

      {/* Notificações dropdown */}
      {notifOpen&&(
        <div style={{position:"fixed",top:52,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"#fff",zIndex:50,boxShadow:"0 8px 32px #0003",borderRadius:"0 0 16px 16px",padding:"12px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:700,color:"#888"}}>🔔 Alertas ({alertas.length})</span>
            <button onClick={()=>setNotifOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#aaa"}}>Fechar</button>
          </div>
          {alertas.map(c=>(
            <div key={c.id} style={{display:"flex",gap:8,alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f5f5f5"}}>
              <span>{c.status==="inativo"?"🔴":"🟡"}</span>
              <div>
                <p style={{margin:0,fontSize:12,fontWeight:600,color:"#333"}}>{c.nome}</p>
                <p style={{margin:0,fontSize:10,color:"#888"}}>{diasSemCompra(c.uc)} dias sem comprar · {c.status==="inativo"?"Inativa":"Prestes a inativar"}</p>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Conteúdo */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:70}}>
        {aba==="dashboard"&&<Dashboard atendimentos={atendimentos}/>}
        {aba==="clientes"&&<Clientes atendimentos={atendimentos} onRegistrar={onRegistrar}/>}
        {aba==="prospeccao"&&<Prospeccao/>}
        {aba==="metas"&&<Metas atendimentos={atendimentos}/>}
        {aba==="carreira"&&<Carreira/>}
      </div>

      {/* BottomNav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:"#fff",borderTop:"1px solid #f0f0f0",display:"flex",zIndex:20}}>
        {abas.map(a=>(
          <button key={a.id} onClick={()=>setAba(a.id)} style={{flex:1,padding:"10px 4px 8px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:20}}>{a.ic}</span>
            <span style={{fontSize:8,fontWeight:700,color:aba===a.id?"#7B3FA0":"#aaa",textTransform:"uppercase",letterSpacing:.3}}>{a.l}</span>
            {aba===a.id&&<div style={{width:18,height:2,background:"#7B3FA0",borderRadius:1}}/>}
          </button>
        ))}
      </div>

      {/* Modal atendimento rápido */}
      {modalRapido&&!clienteRapido&&(
        <div style={{position:"fixed",inset:0,background:"#0008",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:420,padding:"20px 16px 32px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:800,color:"#1a1a2e"}}>Selecionar Cliente</h3>
              <button onClick={()=>setModalRapido(false)} style={{background:"#f5f5f5",border:"none",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:15}}>✕</button>
            </div>
            <p style={{color:"#aaa",fontSize:11,marginBottom:12}}>Clique para registrar atendimento:</p>
            <div style={{maxHeight:320,overflowY:"auto"}}>
              {CLIENTES.map(c=>(
                <div key={c.id} onClick={()=>setClienteRapido(c)} style={{display:"flex",gap:10,alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}}>
                  <Avatar nome={c.nome} size={34}/>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:12,fontWeight:600,color:"#333"}}>{c.nome}</p>
                    <p style={{margin:0,fontSize:10,color:"#aaa"}}>{diasSemCompra(c.uc)}d sem comprar · {fmtMoeda(c.tkm)}</p>
                  </div>
                  <BadgeStatus status={c.status}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {clienteRapido&&<ModalAtend cliente={clienteRapido} onClose={()=>{setClienteRapido(null);setModalRapido(false);}} onSalvar={(d)=>{onRegistrar(d);setClienteRapido(null);setModalRapido(false);}}/>}
    </div>
  );
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App/>);
</script>
</body>
</html>
